name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            outfile: livetube-linux-x64
          - target: bun-linux-arm64
            outfile: livetube-linux-arm64
          - target: bun-darwin-x64
            outfile: livetube-macos-x64
          - target: bun-darwin-arm64
            outfile: livetube-macos-arm64
          - target: bun-windows-x64
            outfile: livetube-windows-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          bun build --compile --minify \
            --target=${{ matrix.target }} \
            ./index.ts \
            --outfile ${{ matrix.outfile }}

      # - name: Install UPX
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y upx-ucl

      - name: Install UPX
        run: |
          set -e
          # Detect architecture
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64) UPX_ARCH="amd64_linux" ;;
            aarch64|arm64) UPX_ARCH="arm64_linux" ;;
            *)
              echo "Unsupported architecture: $ARCH"
              exit 1
              ;;
          esac

          # Get latest release tag
          VERSION=$(curl -s https://api.github.com/repos/upx/upx/releases/latest | grep '"tag_name"' | cut -d '"' -f4)
          URL="https://github.com/upx/upx/releases/download/${VERSION}/upx-${VERSION#v}-${UPX_ARCH}.tar.xz"

          echo "Downloading UPX $VERSION for $ARCH"
          curl -L "$URL" -o upx.tar.xz
          tar -xf upx.tar.xz

          sudo mv upx-*/upx /usr/local/bin/upx

          upx --version

      - name: Compress binary with UPX
        run: |
          upx --best --lzma "${{ matrix.outfile }}" || echo "UPX not available or compression failed"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.outfile }}
          path: ${{ matrix.outfile }}
          retention-days: 1

  docker:
    name: Build & Push Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [build, docker]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
          pattern: livetube-*

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: LiveTube ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
